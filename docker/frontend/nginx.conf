# ─────────────────────────────────────────────────────────────────────────────
# Nginx config for the BootWhatsapp frontend.
#   /            → SPA (dist/index.html with HTML5 history fallback)
#   /api/...     → proxy to backend:8000
#   /media/...   → proxy to backend:8000 (Django-served uploads)
#   /static/...  → proxy to backend:8000 (whitenoise-served admin assets)
#   /healthz     → liveness for HEALTHCHECK
# ─────────────────────────────────────────────────────────────────────────────

upstream backend_upstream {
    server backend:8000;
    keepalive 16;
}

server {
    listen 80 default_server;
    server_name _;

    # Generous body size for image/PDF uploads validated by Vision
    client_max_body_size 25m;

    # Gzip text assets — Vite already hashes filenames so cache headers are safe
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               application/xml+rss image/svg+xml;
    gzip_min_length 1024;

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── API reverse-proxy ───────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;
    }

    location /media/ {
        proxy_pass         http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }

    location /static/ {
        proxy_pass         http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   Connection        "";
    }

    # Meta webhook — same host, no /api prefix
    location = /webhook {
        proxy_pass         http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Hub-Signature-256 $http_x_hub_signature_256;
    }

    # ── SPA: hash-named assets get long cache, index.html stays fresh ───────
    root /usr/share/nginx/html;
    index index.html;

    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA entry: NEVER cache — el browser debe revalidar siempre para tomar el
    # último bundle hasheado. Sin esto, una versión cacheada del index.html
    # sigue apuntando al bundle viejo aunque haya un deploy nuevo.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
        try_files $uri =404;
    }

    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
        try_files $uri $uri/ /index.html;
    }
}
